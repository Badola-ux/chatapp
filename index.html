<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChatApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar background">
    <div class="container-fluid">
        <a class="navbar-brand text-light" href="#">MyChat</a>
    </div>
</nav>

<div class="container-fluid mid-section">
    
    <!-- Chat messages -->
    <div class="first"></div>

    <!-- Input section -->
    <div class="second">
        <div class="row">
            <div class="col-lg-8 col-md-10 col-sm-11 m-auto">
                
                <form class="w-100" onsubmit="postData(); return false;">
                    <div class="btn-group w-100">
                        <input type="text" id="message" class="form-control border-dark" placeholder="Enter Message....">
                        <button type="submit" class="btn btn-primary border-secondary background">Send</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</div>

<footer class="background text-light text-center p-2 mt-1">
    <p>copyright@mychatapp.com</p>
</footer>

<script src="http://localhost:8000/socket.io/socket.io.js"></script>
<script src="js/client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
